    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 0;
    }
    .content {
      position: relative;
      z-index: 1;
      max-width: 680px;
      width: 92%;
      text-align: center;
      padding: 40px 20px;
      margin-top: 60vh;
    }
    .icon {
      font-size: 80px;
      line-height: 1;
      margin-bottom: 20px;
      display: block;
      animation: shake 0.6s ease-in-out infinite alternate;
    }
    @keyframes shake { from { transform: rotate(-4deg); } to { transform: rotate(4deg); } }
    .label-canh-bao {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(48px, 10vw, 96px);
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #ff1a1a;
      text-transform: uppercase;
      text-shadow: 0 0 30px #ff0000cc, 0 0 60px #ff000066, 0 3px 0 #7a0000;
      margin-bottom: 32px;
      animation: glow-text 2s ease-in-out infinite;
    }
    @keyframes glow-text {
      0%, 100% { text-shadow: 0 0 30px #ff0000cc, 0 0 60px #ff000066, 0 3px 0 #7a0000; }
      50%       { text-shadow: 0 0 50px #ff0000ff, 0 0 100px #ff000099, 0 3px 0 #7a0000; }
    }
    .divider {
      width: 70%;
      height: 2px;
      background: linear-gradient(to right, transparent, #ff4444, transparent);
      margin: 0 auto 30px;
    }
    .line {
      font-size: clamp(20px, 4.5vw, 32px);
      font-weight: 900;
      color: #ffffff;
      line-height: 1.6;
      margin-bottom: 18px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.8);
    }
    .line .red { color: #ff4444; }
    .line.highlight {
      color: #ffcc00;
      font-size: clamp(22px, 5vw, 36px);
      text-shadow: 0 0 20px rgba(255,200,0,0.8), 0 2px 8px rgba(0,0,0,0.9);
    }
    .footer {
      margin-top: 32px;
      font-size: 14px;
      color: #ff8888;
      letter-spacing: 0.1em;
      text-shadow: 0 0 10px rgba(255,0,0,0.5);
    }
